/* ---------- 便利贴保持纸张风格 ---------- */
.note {
  --r: 0deg;
  --tx: 0px;
  --ty: 0px;
  --dx: 0px;
  --dy: 0px;
  --enter-delay: 0ms;
  position: relative;
  display: inline-block;
  width: 100%;
  margin: 0 0 18px;
  padding: 1rem 0.95rem 0.95rem;
  border-radius: 10px 10px 18px 12px;
  border: 1px solid rgba(255,255,255,0.26);
  box-shadow:
    0 12px 24px rgba(0,0,0,0.10),
    0 2px 0 rgba(255,255,255,0.32) inset,
    0 0 16px rgba(255,255,255,0.10);
  transform: translate(var(--tx), var(--ty)) rotate(var(--r));
  cursor: pointer;
  overflow: hidden;
  break-inside: avoid;
  -webkit-column-break-inside: avoid;
  transition: box-shadow 0.18s ease, filter 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
}

.note.enter {
  animation: noteEnter 0.42s cubic-bezier(.2,.75,.2,1) both var(--enter-delay);
}

.note::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(160deg, rgba(255,255,255,0.22), transparent 42%),
    repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 2px,
      rgba(0,0,0,0.012) 3px,
      rgba(0,0,0,0.012) 4px
    );
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.note:hover {
  transform: translate(var(--tx), calc(var(--ty) - 4px)) rotate(var(--r)) scale(1.012);
  box-shadow:
    0 18px 28px rgba(0,0,0,0.14),
    0 2px 0 rgba(255,255,255,0.35) inset,
    0 0 0 1px rgba(124,108,255,0.18),
    0 0 18px rgba(56,189,248,0.10);
  filter: saturate(1.03);
  z-index: 4;
}

.note.search-hit {
  box-shadow:
    0 18px 32px rgba(0,0,0,0.13),
    0 2px 0 rgba(255,255,255,0.35) inset,
    0 0 0 2px rgba(124,108,255,0.22),
    0 0 34px rgba(56,189,248,0.16);
}

.note::before {
  content: "";
  position: absolute;
  top: 9px;
  left: var(--tape-left, 50%);
  width: 52px;
  height: 14px;
  transform: translateX(-50%) rotate(var(--tape-r, -2deg));
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.48));
  box-shadow:
    0 2px 0 rgba(0,0,0,0.05),
    0 0 0 1px rgba(255,255,255,0.28) inset;
}

.note-decoration {
  position: absolute;
  z-index: 2;
}

.note-decoration.tape {
  top: 11px;

  height: 14px;

  border: 1px solid rgba(255,255,255,0.34);

    0 2px 6px rgba(0,0,0,0.08),

}

.note-decoration.pin {

  height: 15px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff2, transparent 34%), linear-gradient(135deg, #ef4444, #f97316);
  border: 1px solid rgba(255,255,255,0.30);
  box-shadow:

}

<script>
(function () {
  var SERVER_URL = 'https://waline.kamisheng.xyz';
  var INITIAL_VISIBLE = 30;
  var LOAD_MORE_STEP = 20;
  var NEW_NOTE_KEY = 'kami_comments_last_submitted_stable_v2';
  var DRAFT_KEY = 'kami_comments_draft_stable_v2';
  var MODE_KEY = 'kami_comments_mode_stable_v2';

  var RAW_PATH = window.location.pathname;
  var CANONICAL_PATH = RAW_PATH.replace(/index\.html$/, '').replace(/\/?$/, '/') || '/';

  var PATHS = [];
  [CANONICAL_PATH, CANONICAL_PATH.replace(/\/$/, ''), CANONICAL_PATH + 'index.html'].forEach(function (p) {
    if (PATHS.indexOf(p) === -1) PATHS.push(p);
  });

  var commentsPage = document.getElementById('commentsPage');
  var wallWrap = document.getElementById('wallWrap');
  var wall = document.getElementById('notesWall');
  var modal = document.getElementById('noteModal');
  var modalCard = document.getElementById('noteModalCard');
  var modalAuthor = document.getElementById('noteModalAuthor');
  var modalTime = document.getElementById('noteModalTime');
  var modalContent = document.getElementById('noteModalContent');
  var modalClose = document.getElementById('noteModalClose');
  var modalPrev = document.getElementById('notePrev');
  var modalNext = document.getElementById('noteNext');
  var loadMoreBtn = document.getElementById('loadMoreBtn');
  var countChip = document.getElementById('countChip');
  var searchInput = document.getElementById('searchInput');
  var sortGroup = document.getElementById('sortGroup');
  var modeToggle = document.getElementById('modeToggle');
  var quickActions = document.getElementById('quickActions');
  var autoLoadSentinel = document.getElementById('autoLoadSentinel');

  var noteForm = document.getElementById('noteForm');
  var noteNick = document.getElementById('noteNick');
  var noteMail = document.getElementById('noteMail');
  var noteComment = document.getElementById('noteComment');
  var noteSubmit = document.getElementById('noteSubmit');
  var noteFormTip = document.getElementById('noteFormTip');

  var colors = ['c1', 'c2', 'c3', 'c4', 'c5', 'c6'];
  var rotations = [-4, -2, -1, 1, 2, 4];
  var txs = [-12, -7, -3, 4, 8, 13];
  var tys = [0, 8, 14, 22, 30];
  var tapeLefts = ['43%', '47%', '50%', '54%', '58%'];
  var tapeRots = ['-5deg', '-2deg', '1deg', '3deg'];
  var sizes = ['size-s', 'size-m', 'size-l'];
  var floatDurations = [4.1, 4.8, 5.3, 5.9];
  var floatDelays = [-1.2, -0.8, -2, -1.5, -0.3];
  var decorationTypes = ['tape', 'pin', 'corner'];

  var notesData = [];
  var filteredNotes = [];
  var currentIndex = 0;
  var visibleCount = INITIAL_VISIBLE;
  var sortMode = 'latest';
  var randomSeed = Date.now();
  var lastAnchorRect = null;
  var modalOpen = false;
  var modalSwitching = false;

  function removeThemeWaline() {
    [
      '#waline',
      '.comment-container',
      '.comment-wrap',
      '.comment-area',
      '.comment-box',
      '.post-comment',
      '.post-comments',
      '.comment-title',
      '.comments-title',
      '#comments',
      '.comment',
      '.comment-block',
      '.comments'
    ].forEach(function (selector) {
      var list = document.querySelectorAll(selector);
      list.forEach(function (el) { el.remove(); });
    });

    document.querySelectorAll('script').forEach(function (s) {
      var txt = s.textContent || '';
      var src = s.getAttribute('src') || '';
      if (src.indexOf('/js/libs/waline.js') !== -1 || txt.indexOf("el: '#waline'") !== -1 || txt.indexOf('redefineWalineInstance') !== -1) {
        s.remove();
      }
    });

    document.querySelectorAll('h1,h2,h3,h4,div,span,p').forEach(function (el) {
      var text = (el.textContent || '').trim();
      if (/^(评论|Comments?)$/.test(text) || /Powered by Waline/i.test(text)) {
        el.remove();
      }
    });
  }

  function startWalineRemovalGuard() {
  removeThemeWaline();
  window.addEventListener('load', removeThemeWaline);
  setTimeout(removeThemeWaline, 300);
  setTimeout(removeThemeWaline, 1200);
}

  function saveDraft() {
    try {
      localStorage.setItem(DRAFT_KEY, JSON.stringify({
        nick: noteNick.value,
        mail: noteMail.value,
        comment: noteComment.value
      }));
    } catch (e) {}
  }

  function loadDraft() {
    try {
      var raw = localStorage.getItem(DRAFT_KEY);
      if (!raw) return;
      var draft = JSON.parse(raw);
      if (draft.nick) noteNick.value = draft.nick;
      if (draft.mail) noteMail.value = draft.mail;
      if (draft.comment) noteComment.value = draft.comment;
    } catch (e) {}
  }

  function clearDraft() {
    try {
      localStorage.removeItem(DRAFT_KEY);
    } catch (e) {}
  }

  function autoResizeTextarea(el) {
    el.style.height = '48px';
    var h = Math.min(Math.max(el.scrollHeight, 48), 120);
    el.style.height = h + 'px';
  }

  function escapeHTML(str) {
    str = str || '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function stripHTML(html) {
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
  }

  function normalizeText(text) {
    return String(text || '').replace(/\s+/g, ' ').trim();
  }

  function renderCommentHTML(html) {
    var div = document.createElement('div');
    div.innerHTML = html || '';

    div.querySelectorAll('img').forEach(function (img) {
      img.classList.add('note-image');
      img.setAttribute('loading', 'lazy');
      img.setAttribute('decoding', 'async');
    });

    div.querySelectorAll('a').forEach(function (a) {
      var href = a.getAttribute('href') || '';
      var isImage = /\.(png|jpe?g|gif|webp|avif|svg)(\?.*)?$/i.test(href);
      if (isImage && !a.querySelector('img')) {
        var img = document.createElement('img');
        img.src = href;
        img.alt = 'image';
        img.className = 'note-image';
        img.setAttribute('loading', 'lazy');
        img.setAttribute('decoding', 'async');
        a.replaceWith(img);
      }
    });

    return div.innerHTML;
  }

  function formatTime(value) {
    if (!value) return '';
    var d = new Date(value);
    if (isNaN(d.getTime())) return value;
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function isAdmin(item) {
    var nick = String((item && item.nick) || '').toLowerCase();
    return /kami|kamisheng/.test(nick);
  }

  function hashString(str) {
    str = str || '';
    var h = 0;
    for (var i = 0; i < str.length; i += 1) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function hottestScore(item) {
    return Number((item && item.like) || 0) * 5 +
      Number((item && item.childrenCount) || 0) * 3 +
      Math.min(stripHTML((item && item.comment) || '').length / 80, 2);
  }

  function flattenComments(list, result, depth, parentNick) {
    list = list || [];
    result = result || [];
    depth = depth || 0;
    parentNick = parentNick || '';

    list.forEach(function (item) {
      var cloned = {};
      for (var k in item) cloned[k] = item[k];
      cloned.depth = depth;
      cloned.parentNick = parentNick;
      cloned.childrenCount = Array.isArray(item.children) ? item.children.length : 0;
      result.push(cloned);

      if (Array.isArray(item.children) && item.children.length) {
        flattenComments(item.children, result, depth + 1, item.nick || parentNick);
      }
    });
    return result;
  }

  function extractList(json) {
    if (json && Array.isArray(json.data)) return json.data;
    if (json && json.data && Array.isArray(json.data.data)) return json.data.data;
    if (json && Array.isArray(json.comments)) return json.comments;
    if (json && Array.isArray(json.list)) return json.list;
    return [];
  }

  function fetchCommentsByPath(path, page, pageSize) {
    page = page || 1;
    pageSize = pageSize || 100;
    var url = SERVER_URL + '/api/comment?path=' + encodeURIComponent(path) + '&page=' + page + '&pageSize=' + pageSize;

    return fetch(url)
      .then(function (res) { return res.json(); })
      .then(function (json) {
        return flattenComments(extractList(json));
      });
  }

  function loadComments() {
    var merged = new Map();
    var chain = Promise.resolve();

    PATHS.forEach(function (path) {
      chain = chain.then(function () {
        var page = 1;

        function loop() {
          if (page > 5) return Promise.resolve();

          return fetchCommentsByPath(path, page, 100)
            .then(function (list) {
              if (!list.length) return;

              list.forEach(function (item) {
                var key = item.objectId != null ? item.objectId : (item.nick + '-' + item.time + '-' + item.comment);
                if (!merged.has(key)) merged.set(key, item);
              });

              if (list.length < 100) return;
              page += 1;
              return loop();
            })
            .catch(function (err) {
              console.error('fetch path failed:', path, err);
            });
        }

        return loop();
      });
    });

    return chain.then(function () {
      return Array.from(merged.values());
    });
  }

  function getLastSubmitted() {
    try {
      var raw = localStorage.getItem(NEW_NOTE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function clearLastSubmitted() {
    try {
      localStorage.removeItem(NEW_NOTE_KEY);
    } catch (e) {}
  }

  function updateCountChip() {
    if (!filteredNotes.length && !notesData.length) {
      countChip.textContent = '还没有便利贴';
      return;
    }
    if (filteredNotes.length === notesData.length) {
      countChip.textContent = '已贴 ' + notesData.length + ' 张便利贴';
    } else {
      countChip.textContent = '筛到 ' + filteredNotes.length + ' / ' + notesData.length + ' 张';
    }
  }

  function updateLoadMore() {
    if (filteredNotes.length > visibleCount) {
      loadMoreBtn.style.display = 'inline-flex';
      loadMoreBtn.textContent = '加载更多（剩余 ' + (filteredNotes.length - visibleCount) + '）';
    } else {
      loadMoreBtn.style.display = 'none';
    }
  }

  function makeDecoration(hash) {
    return decorationTypes[hash % decorationTypes.length];
  }

  function applyFiltersAndSort() {
    var query = normalizeText(searchInput.value.toLowerCase());
    var arr = notesData.slice();

    if (query) {
      arr = arr.filter(function (item) {
        var nick = normalizeText(String((item && item.nick) || '').toLowerCase());
        var text = normalizeText(stripHTML((item && item.comment) || '').toLowerCase());
        return nick.indexOf(query) !== -1 || text.indexOf(query) !== -1;
      });
    }

    if (sortMode === 'latest') {
      arr.sort(function (a, b) { return (b.time || 0) - (a.time || 0); });
    } else if (sortMode === 'hottest') {
      arr.sort(function (a, b) { return hottestScore(b) - hottestScore(a); });
    } else if (sortMode === 'random') {
      arr.sort(function (a, b) {
        var ha = hashString(((a.objectId || a.comment || '') + randomSeed));
        var hb = hashString(((b.objectId || b.comment || '') + randomSeed));
        return ha - hb;
      });
    }

    filteredNotes = arr;
    updateCountChip();
    renderWall(filteredNotes);
  }

  function renderWall(list) {
    if (!list.length) {
      wall.innerHTML = '<div class="wall-empty">还没有留言，来留下第一张便利贴吧 ✨</div>';
      loadMoreBtn.style.display = 'none';
      return;
    }

    wall.innerHTML = '';
    wall.classList.remove('is-focus-mode');

    var visible = list.slice(0, visibleCount);
    var lastSubmitted = getLastSubmitted();
    var matchedNew = false;
    var hasSearch = normalizeText(searchInput.value).length > 0;

    visible.forEach(function (item, index) {
      var stableKey = String(item.objectId || (item.nick + '-' + item.time + '-' + item.comment));
      var hash = hashString(stableKey);
      var colorClass = colors[index % colors.length];
      var sizeClass = sizes[index % sizes.length];
      var rotate = rotations[index % rotations.length];
      var tx = txs[index % txs.length];
      var ty = tys[index % tys.length];
      var tapeLeft = tapeLefts[index % tapeLefts.length];
      var tapeRot = tapeRots[index % tapeRots.length];
      var floatDur = floatDurations[index % floatDurations.length];
      var floatDelay = floatDelays[index % floatDelays.length];
      var decoration = makeDecoration(hash);
      var isRare = hash % 17 === 0;
      var isAdminNote = isAdmin(item);

      var plainComment = normalizeText(stripHTML(item.comment || ''));
      var isNew = false;

      if (!matchedNew && lastSubmitted &&
          normalizeText(item.nick || '') === normalizeText(lastSubmitted.nick || '') &&
          plainComment === normalizeText(lastSubmitted.comment || '') &&
          Date.now() - Number(lastSubmitted.stamp || 0) < 10 * 60 * 1000) {
        isNew = true;
        matchedNew = true;
      }

      el = document.createElement('article');
      el.className = 'note ' + colorClass + ' ' + sizeClass + ' enter' +
        (isNew ? ' note-new' : '') +
        (isRare ? ' note-rare' : '') +
        (isAdminNote ? ' note-admin' : '') +
        (hasSearch ? ' search-hit' : '');

      el.style.setProperty('--r', rotate + 'deg');
      el.style.setProperty('--tx', tx + 'px');
      el.style.setProperty('--ty', ty + 'px');
      el.style.setProperty('--tape-left', tapeLeft);
      el.style.setProperty('--tape-r', tapeRot);
      el.style.setProperty('--float-dur', floatDur + 's');
      el.style.setProperty('--float-delay', floatDelay + 's');
      el.style.setProperty('--enter-delay', Math.min(index, 11) * 55 + 'ms');

      var tags = [];
      if (item.depth > 0 && item.parentNick) tags.push('<span class="note-tag">回复 ' + escapeHTML(item.parentNick) + '</span>');
      if (isAdminNote) tags.push('<span class="note-tag">KAMI</span>');
      if (isRare) tags.push('<span class="note-tag">RARE</span>');

      el.innerHTML =
        (isNew ? '<span class="note-badge">NEW</span>' : '') +
        '<span class="note-decoration ' + decoration + '"></span>' +
        '<div class="note-author">' + escapeHTML(item.nick || '匿名') + '</div>' +
        '<div class="note-time">' + escapeHTML(formatTime(item.time)) + '</div>' +
        (tags.length ? '<div class="note-meta">' + tags.join('') + '</div>' : '') +
        '<div class="note-content">' + renderCommentHTML(item.comment || '') + '</div>';

      el.addEventListener('mouseenter', function () {
        wall.classList.add('is-focus-mode');
        wall.querySelectorAll('.note').forEach(function (n) {
          n.classList.remove('hover-focus');
        });
        el.classList.add('hover-focus');
      });

      el.addEventListener('mouseleave', function () {
        el.classList.remove('hover-focus');
        wall.classList.remove('is-focus-mode');
      });

      el.addEventListener('click', function () {
        openModal(index, el);
      });

      wall.appendChild(el);

      if (isNew) {
        setTimeout(function () {
          el.classList.remove('note-new');
          var badge = el.querySelector('.note-badge');
          if (badge) badge.remove();
        }, 3200);
      }
    });

    if (matchedNew) {
      setTimeout(clearLastSubmitted, 1200);
    }

    updateLoadMore();
  }

  function getVisibleNoteElements() {
    return Array.from(wall.querySelectorAll('.note'));
  }

  function updateModalNav() {
    modalPrev.disabled = currentIndex <= 0;
    modalNext.disabled = currentIndex >= Math.min(filteredNotes.length, visibleCount) - 1;
  }

  function fillModalContent(index) {
    var item = filteredNotes[index];
    var colorClass = colors[index % colors.length];
    modalCard.className = 'note-modal-card ' + colorClass;
    modalAuthor.textContent = item.nick || '匿名';
    modalTime.textContent = formatTime(item.time);
    modalContent.innerHTML = renderCommentHTML(item.comment || '');
    updateModalNav();
  }

  function animateModalOpen(anchorEl) {
    var cardRect = modalCard.getBoundingClientRect();
    var rect = anchorEl.getBoundingClientRect();
    lastAnchorRect = rect;

    var viewportCenterX = window.innerWidth / 2;
    var viewportCenterY = window.innerHeight / 2;
    var noteCenterX = rect.left + rect.width / 2;
    var noteCenterY = rect.top + rect.height / 2;
    var dx = noteCenterX - viewportCenterX;
    var dy = noteCenterY - viewportCenterY;
    var scale = Math.max(0.34, Math.min(rect.width / cardRect.width, rect.height / cardRect.height));

    modalCard.style.transition = 'none';
    modalCard.style.opacity = '0.36';
    modalCard.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(' + scale + ')';

    requestAnimationFrame(function () {
      modalCard.style.transition = 'transform 0.32s cubic-bezier(.2,.8,.2,1), opacity 0.28s ease';
      modalCard.style.opacity = '1';
      modalCard.style.transform = 'translate(-50%, -50%) scale(1)';
    });
  }

  function animateModalClose(callback) {
    if (!lastAnchorRect) {
      modal.classList.remove('show');
      if (callback) callback();
      return;
    }

    var rect = lastAnchorRect;
    var cardRect = modalCard.getBoundingClientRect();
    var viewportCenterX = window.innerWidth / 2;
    var viewportCenterY = window.innerHeight / 2;
    var noteCenterX = rect.left + rect.width / 2;
    var noteCenterY = rect.top + rect.height / 2;
    var dx = noteCenterX - viewportCenterX;
    var dy = noteCenterY - viewportCenterY;
    var scale = Math.max(0.34, Math.min(rect.width / cardRect.width, rect.height / cardRect.height));

    modalCard.style.transition = 'transform 0.28s cubic-bezier(.2,.8,.2,1), opacity 0.24s ease';
    modalCard.style.opacity = '0.28';
    modalCard.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(' + scale + ')';

    setTimeout(function () {
      modal.classList.remove('show');
      modalCard.style.transition = '';
      modalCard.style.opacity = '1';
      modalCard.style.transform = 'translate(-50%, -50%) scale(1)';
      if (callback) callback();
    }, 290);
  }

  function openModal(index, anchorEl) {
    currentIndex = index;
    fillModalContent(index);
    modal.classList.add('show');
    modalOpen = true;

    requestAnimationFrame(function () {
      animateModalOpen(anchorEl || getVisibleNoteElements()[index]);
    });
  }

  function switchModal(direction) {
    if (modalSwitching) return;
    var nextIndex = currentIndex + direction;
    var maxIndex = Math.min(filteredNotes.length, visibleCount) - 1;
    if (nextIndex < 0 || nextIndex > maxIndex) return;

    modalSwitching = true;

    var outClass = direction > 0 ? 'switch-out-left' : 'switch-out-right';
    var inClass = direction > 0 ? 'switch-in-left' : 'switch-in-right';

    modalCard.classList.remove('switch-out-left', 'switch-out-right', 'switch-in-left', 'switch-in-right');
    modalCard.classList.add(outClass);

    setTimeout(function () {
      currentIndex = nextIndex;
      fillModalContent(currentIndex);
      modalCard.classList.remove(outClass);
      modalCard.classList.add(inClass);

      setTimeout(function () {
        modalCard.classList.remove(inClass);
        modalSwitching = false;
      }, 220);
    }, 170);
  }

  function closeModal() {
    if (!modalOpen) return;
    modalOpen = false;
    animateModalClose();
  }

  function prevModal() {
    switchModal(-1);
  }

  function nextModal() {
    switchModal(1);
  }

  modalClose.addEventListener('click', closeModal);
  modalPrev.addEventListener('click', prevModal);
  modalNext.addEventListener('click', nextModal);

  modal.addEventListener('click', function (e) {
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', function (e) {
    if (!modalOpen) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') prevModal();
    if (e.key === 'ArrowRight') nextModal();
  });

  function setTip(text, isError) {
    noteFormTip.textContent = text || '';
    noteFormTip.classList.remove('is-ok', 'is-error');

    if (!text) return;

    if (isError) {
      noteFormTip.classList.add('is-error');
    } else {
      noteFormTip.classList.add('is-ok');
    }
  }

  function loadWall() {
    wall.innerHTML = '<div class="wall-empty">正在加载留言墙...</div>';
    loadComments()
      .then(function (data) {
        notesData = data;
        applyFiltersAndSort();
      })
      .catch(function (err) {
        wall.innerHTML = '<div class="wall-empty">留言墙加载失败了，检查一下 Waline 服务地址吧。</div>';
        console.error(err);
      });
  }

  function submitComment(payload) {
    return fetch(SERVER_URL + '/api/comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function (res) {
        return res.text().then(function (rawText) {
          var data = {};
          try {
            data = rawText ? JSON.parse(rawText) : {};
          } catch (e) {
            data = { rawText: rawText };
          }

          console.log('[留言提交结果]', {
            status: res.status,
            ok: res.ok,
            payload: payload,
            data: data,
            rawText: rawText
          });

          if (!res.ok) {
            throw new Error('HTTP ' + res.status + ': ' + (((data && (data.msg || data.message)) || rawText || '发送失败')));
          }
          return data;
        });
      });
  }

  function handleCustomSubmit() {
    var nick = noteNick.value.trim();
    var mail = noteMail.value.trim();
    var comment = noteComment.value.trim();

    if (!nick) {
      setTip('请先写昵称', true);
      return Promise.resolve();
    }

    if (!comment) {
      setTip('请先写留言内容', true);
      return Promise.resolve();
    }

    noteSubmit.disabled = true;
    setTip('正在贴上去...');
    console.log('[留言提交] handleCustomSubmit start');

    return submitComment({
      nick: nick,
      mail: mail,
      comment: comment,
      url: CANONICAL_PATH,
      ua: navigator.userAgent
    }).then(function () {
      try {
        localStorage.setItem(NEW_NOTE_KEY, JSON.stringify({
          nick: nick,
          comment: comment,
          stamp: Date.now()
        }));
      } catch (e) {}

      clearDraft();
      noteComment.value = '';
      autoResizeTextarea(noteComment);
      visibleCount = INITIAL_VISIBLE;

      noteForm.classList.remove('sent');
      void noteForm.offsetWidth;
      noteForm.classList.add('sent');

      setTip('贴上去啦 ✨');

      setTimeout(loadWall, 1200);
      setTimeout(loadWall, 2600);
      setTimeout(loadWall, 4200);
    }).catch(function (err) {
      saveDraft();
      setTip((err.message || '发送失败') + '，草稿已保存在本地', true);
      console.error(err);
    }).finally(function () {
      noteSubmit.disabled = false;
    });
  }

  noteForm.addEventListener('submit', function (e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  });

  noteSubmit.addEventListener('click', function (e) {
    e.preventDefault();
    e.stopPropagation();
    console.log('[留言按钮] click');
    handleCustomSubmit();
  });

  noteComment.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      handleCustomSubmit();
    }
  });

  noteNick.addEventListener('input', saveDraft);
  noteMail.addEventListener('input', saveDraft);
  noteComment.addEventListener('input', function () {
    autoResizeTextarea(noteComment);
    saveDraft();
  });

  quickActions.addEventListener('click', function (e) {
    var btn = e.target.closest('.quick-btn');
    if (!btn) return;
    var fill = btn.getAttribute('data-fill') || '';
    noteComment.value = noteComment.value + (noteComment.value ? '\n' : '') + fill;
    autoResizeTextarea(noteComment);
    saveDraft();
    noteComment.focus();
  });

  sortGroup.addEventListener('click', function (e) {
    var btn = e.target.closest('.sort-btn');
    if (!btn) return;
    sortMode = btn.getAttribute('data-sort') || 'latest';
    if (sortMode === 'random') randomSeed = Date.now();
    visibleCount = INITIAL_VISIBLE;

    sortGroup.querySelectorAll('.sort-btn').forEach(function (b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    applyFiltersAndSort();
  });

  searchInput.addEventListener('input', function () {
    visibleCount = INITIAL_VISIBLE;
    applyFiltersAndSort();
  });

  modeToggle.addEventListener('click', function () {
    var next = commentsPage.dataset.mode === 'night' ? 'day' : 'night';
    commentsPage.dataset.mode = next;
    modeToggle.textContent = next === 'night' ? '日间氛围' : '夜间氛围';
    try {
      localStorage.setItem(MODE_KEY, next);
    } catch (e) {}
  });

  loadMoreBtn.addEventListener('click', function () {
    visibleCount += LOAD_MORE_STEP;
    renderWall(filteredNotes);
  });

  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting && filteredNotes.length > visibleCount) {
          visibleCount += LOAD_MORE_STEP;
          renderWall(filteredNotes);
        }
      });
    }, { rootMargin: '240px' });
    io.observe(autoLoadSentinel);
  }

  function bindWallParallax() {
  wallWrap.addEventListener('mouseenter', function () {
    wallWrap.style.boxShadow = '0 22px 46px rgba(4,10,24,0.22), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 24px rgba(56,189,248,0.08)';
  });

  wallWrap.addEventListener('mouseleave', function () {
    wallWrap.style.boxShadow = '0 18px 40px rgba(4,10,24,0.18), 0 0 0 1px rgba(255,255,255,0.04) inset';
    wall.classList.remove('is-focus-mode');
    wall.querySelectorAll('.note').forEach(function (n) {
      n.classList.remove('hover-focus');
    });
  });
}

  function restoreMode() {
    try {
      var saved = localStorage.getItem(MODE_KEY);
      if (saved === 'night' || saved === 'day') {
        commentsPage.dataset.mode = saved;
        modeToggle.textContent = saved === 'night' ? '日间氛围' : '夜间氛围';
      }
    } catch (e) {}
  }

  function initDraftNotice() {
    try {
      var raw = localStorage.getItem(DRAFT_KEY);
      if (raw) {
        var d = JSON.parse(raw);
        if (d.comment || d.nick || d.mail) {
          setTip('已恢复上次草稿。');
        }
      }
    } catch (e) {}
  }

  restoreMode();
  loadDraft();
  autoResizeTextarea(noteComment);
  initDraftNotice();
  startWalineRemovalGuard();
  bindWallParallax();
  loadWall();
})();
</script>
